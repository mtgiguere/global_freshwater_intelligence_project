name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv python install 3.12
      - run: uv sync --group dev

      - name: Ruff — check violations
        run: uv run ruff check .

      - name: Ruff — check formatting
        run: uv run ruff format --check .

  security:
    name: Vulnerability Scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv python install 3.12
      - run: uv sync --group dev

      - name: Audit dependencies for known CVEs
        run: uv run pip-audit

  test:
    name: Tests (pytest — 90% coverage gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv python install 3.12
      - run: uv sync --group dev

      - name: Run test suite
        run: uv run pytest
