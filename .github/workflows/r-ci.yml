name: R CI

on:
  push:
    branches: [main, master]
    paths:
      - "analysis/**"
      - ".github/workflows/r-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "analysis/**"
      - ".github/workflows/r-ci.yml"

jobs:
  lint:
    name: Lint (lintr)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analysis
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - uses: r-lib/actions/setup-renv@v2

      - name: Lint
        run: Rscript -e "lintr::lint_package(); quit(status = length(lintr::lint_package()) > 0)"

  test:
    name: Tests (testthat)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analysis
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - uses: r-lib/actions/setup-renv@v2

      - name: Run tests
        run: Rscript -e "devtools::test()"
