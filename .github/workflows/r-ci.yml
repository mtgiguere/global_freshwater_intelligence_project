name: R CI

on:
  push:
    branches: [main, master]
    paths:
      - "analysis/**"
      - ".github/workflows/r-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "analysis/**"
      - ".github/workflows/r-ci.yml"

# Disable renv autoload so setup-r-dependencies can use pak freely.
# Once renv.lock contains the full package set, switch both jobs to
# setup-renv@v2 and remove this env block.
env:
  RENV_CONFIG_AUTOLOAD_ENABLED: FALSE

jobs:
  lint:
    name: Lint (lintr)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analysis
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: analysis
          extra-packages: |
            any::lintr
            any::devtools

      - name: Lint
        run: Rscript -e "lintr::lint_package(); quit(status = length(lintr::lint_package()) > 0)"

  test:
    name: Tests (testthat)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analysis
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: analysis
          extra-packages: |
            any::devtools
            any::testthat

      - name: Run tests
        run: Rscript -e "devtools::test()"
