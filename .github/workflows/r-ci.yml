name: R CI

on:
  push:
    branches: [main, master]
    paths:
      - "analysis/**"
      - ".github/workflows/r-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "analysis/**"
      - ".github/workflows/r-ci.yml"

# renv.lock is not committed until the full Phase 3 package set is installed.
# setup-r-dependencies reads from analysis/DESCRIPTION directly via pak.
# Once renv.lock is committed: remove extra-packages, swap to setup-renv@v2.

jobs:
  lint:
    name: Lint (lintr)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analysis
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::lintr
            any::devtools
          needs: check

      - name: Lint
        run: Rscript -e "lintr::lint_package(); quit(status = length(lintr::lint_package()) > 0)"

  test:
    name: Tests (testthat)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analysis
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::devtools
            any::testthat
          needs: check

      - name: Run tests
        run: Rscript -e "devtools::test()"
